        .badge-case_mismanaged { background: #ffedd5; color: #9a3412; border-left: 3px solid #ef4444; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: white; padding: 12px 20px; border-radius: 8px; z-index: 1100; border-left: 4px solid #3b82f6; animation: slideIn 0.3s ease; max-width: 350px; }
        .toast-success { border-left-color: #10b981; }
        .toast-warning { border-left-color: #f59e0b; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .stat-card { transition: transform 0.2s; cursor: pointer; } 
        .stat-card:hover { transform: translateY(-2px); background-color: #f3f4f6; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid white; background: #e2e8f0; }
        details { margin-bottom: 1rem; border: 1px solid #e5e7eb; border-radius: 0.75rem; background: white; overflow: hidden; }
        details summary { padding: 0.75rem 1rem; background-color: #f9fafb; cursor: pointer; font-weight: 600; list-style: none; display: flex; align-items: center; gap: 0.5rem; }
        .contact-bar { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; border-radius: 1rem; padding: 0.75rem; margin: 1rem 0; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app"></div>
    <div id="toastContainer"></div>
    <script>
        // ------------------- API CONFIG -------------------
        const API_BASE = 'https://uganda-safevoice-api.onrender.com';
        let token = localStorage.getItem('token');
        let currentUser = null;
        let currentFilter = null;

        function showNotification(msg, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'success' ? 'toast-success' : type === 'warning' ? 'toast-warning' : ''}`;
            toast.innerHTML = `<i class="fas fa-bell mr-2"></i> ${msg}`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function apiFetch(endpoint, options = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
            if (res.status === 401 && token) {
                localStorage.removeItem('token');
                token = null;
                currentUser = null;
                showNotification('Session expired. Please login again.', 'warning');
                renderPublicView();
                return null;
            }
            return res;
        }

        const statusLabels = { pending:'Pending', dispatched:'Dispatched', investigating:'Under Investigation', resolved:'Resolved', victim_arrested:'Victim Arrested', victim_in_court:'Victim in Court', victim_convicted:'Victim Convicted', case_mismanaged:'Case Mismanaged' };
        function getStatusBadge(status) { return `<span class="badge-${status.replace(/_/g,'-')} px-2 py-0.5 rounded-full text-xs">${statusLabels[status] || status}</span>`; }

        async function renderPoliceAdminDashboard() { /* ... */ }
        async function renderPoliceOfficerDashboard() { /* ... */ }
        async function renderVolunteerDashboard() { /* ... */ }

        async function renderDashboard() {
            if (!currentUser) return renderPublicView();
            const role = currentUser.role;
            if (role === 'admin') await renderAdminDashboard();
            else if (role === 'policeAdmin') await renderPoliceAdminDashboard();
            else if (role === 'policeOfficer') await renderPoliceOfficerDashboard();
            else if (role === 'volunteer') await renderVolunteerDashboard();
        }

        // ------------------- BOOTSTRAP -------------------
        if (token) {
            // Simple token validation: try to fetch cases; if fails, redirect to login
            fetch(`${API_BASE}/cases`, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(res => res.ok ? res.json() : Promise.reject())
                .then(() => { currentUser = JSON.parse(localStorage.getItem('user') || '{}'); renderDashboard(); })
                .catch(() => { localStorage.clear(); renderPublicView(); });
        } else {
            renderPublicView();
        }
