<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192x192.png">
    <title>Uganda SafeVoice</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .badge-pending { background: #fef9c3; color: #854d0e; }
        .badge-dispatched { background: #dbeafe; color: #1e40af; }
        .badge-investigating { background: #fed7aa; color: #9a3412; }
        .badge-resolved { background: #dcfce7; color: #166534; }
        .badge-victim_arrested { background: #fecaca; color: #991b1b; }
        .badge-victim_in_court { background: #c7d2fe; color: #3730a3; }
        .badge-victim_convicted { background: #d1d5db; color: #111827; }
        .badge-case_mismanaged { background: #ffedd5; color: #9a3412; border-left: 3px solid #ef4444; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; color: white; padding: 12px 20px; border-radius: 8px; z-index: 1100; border-left: 4px solid #3b82f6; animation: slideIn 0.3s ease; max-width: 350px; }
        .toast-success { border-left-color: #10b981; }
        .toast-warning { border-left-color: #f59e0b; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .stat-card { transition: transform 0.2s; cursor: pointer; } 
        .stat-card:hover { transform: translateY(-2px); background-color: #f3f4f6; }
        .profile-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid white; background: #e2e8f0; }
        details { margin-bottom: 1rem; border: 1px solid #e5e7eb; border-radius: 0.75rem; background: white; overflow: hidden; }
        details summary { padding: 0.75rem 1rem; background-color: #f9fafb; cursor: pointer; font-weight: 600; list-style: none; display: flex; align-items: center; gap: 0.5rem; }
        .contact-bar { background: linear-gradient(135deg, #1e3a8a, #2563eb); color: white; border-radius: 1rem; padding: 0.75rem; margin: 1rem 0; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 0.5rem; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="app"></div>
    <div id="toastContainer"></div>
    <script>
        // ======================== API CONFIG ========================
        const API_BASE = 'https://uganda-safevoice-api.onrender.com/api';
        let token = localStorage.getItem('token');
        let currentUser = null;
        let currentFilter = null;

        function showNotification(msg, type = 'info') {
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'success' ? 'toast-success' : type === 'warning' ? 'toast-warning' : ''}`;
            toast.innerHTML = `<i class="fas fa-bell mr-2"></i> ${msg}`;
            document.getElementById('toastContainer').appendChild(toast);
            setTimeout(() => toast.remove(), 4000);
        }

        async function apiFetch(endpoint, options = {}) {
            const headers = { 'Content-Type': 'application/json' };
            if (token) headers['Authorization'] = `Bearer ${token}`;
            const res = await fetch(`${API_BASE}${endpoint}`, { ...options, headers });
            if (res.status === 401 && token) {
                localStorage.removeItem('token');
                token = null;
                currentUser = null;
                showNotification('Session expired. Please login again.', 'warning');
                renderPublicView();
                return null;
            }
            return res;
        }

        const statusLabels = { pending:'Pending', dispatched:'Dispatched', investigating:'Under Investigation', resolved:'Resolved', victim_arrested:'Victim Arrested', victim_in_court:'Victim in Court', victim_convicted:'Victim Convicted', case_mismanaged:'Case Mismanaged' };
        function getStatusBadge(status) { return `<span class="badge-${status.replace(/_/g,'-')} px-2 py-0.5 rounded-full text-xs">${statusLabels[status] || status}</span>`; }

        // ======================== PUBLIC VIEW ========================
        function renderPublicView() {
            document.getElementById('app').innerHTML = `
                <div class="max-w-7xl mx-auto px-4 py-6">
                    <div class="bg-white rounded-xl shadow-lg p-6 text-center mb-6">
                        <i class="fas fa-shield-alt text-red-600 text-5xl"></i>
                        <i class="fas fa-flag-uganda text-4xl text-yellow-600 ml-2"></i>
                        <h1 class="text-2xl sm:text-3xl font-bold">Uganda SafeVoice Case Management</h1>
                        <p class="text-gray-600">Report child abuse, GBV, child marriage, whistleblowing – track securely</p>
                        <div class="flex flex-wrap justify-center gap-3 mt-4">
                            <button id="showReportBtn" class="bg-red-600 text-white px-5 py-2 rounded-full shadow hover:bg-red-700"><i class="fas fa-pen-alt"></i> Submit Report</button>
                            <button id="showVictimLoginBtn" class="bg-green-600 text-white px-5 py-2 rounded-full shadow hover:bg-green-700"><i class="fas fa-sign-in-alt"></i> Victim Login</button>
                            <button id="showStaffLoginBtn" class="bg-blue-600 text-white px-5 py-2 rounded-full shadow hover:bg-blue-700"><i class="fas fa-user-shield"></i> Staff Login</button>
                        </div>
                    </div>
                    <div id="formsArea">
                        <div id="reportFormContainer" class="bg-white rounded-xl shadow-lg p-6 hidden">
                            <h2 class="text-xl font-bold mb-4"><i class="fas fa-pen-alt text-red-500"></i> Submit a Report</h2>
                            <form id="reportForm" class="space-y-3">
                                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                                    <div><label>Incident Type *</label><select id="reportType" class="w-full border rounded p-2"><option value="child_abuse">Child Abuse</option><option value="sexual_violence">Sexual Violence</option><option value="gbv">GBV</option><option value="child_marriage">Child Marriage</option><option value="whistleblowing">Whistleblowing</option><option value="other">Other</option></select><input id="otherTypeText" placeholder="Specify type" class="w-full border rounded p-2 mt-1 hidden"></div>
                                    <div><label>District *</label><input id="reportDistrict" placeholder="e.g. Kampala" required class="w-full border rounded p-2"></div>
                                    <div><label>Sub-county</label><input id="reportSubcounty" placeholder="Sub-county" class="w-full border rounded p-2"></div>
                                    <div><label>Parish</label><input id="reportParish" placeholder="Parish" class="w-full border rounded p-2"></div>
                                    <div><label>Village *</label><input id="reportVillage" placeholder="Village" required class="w-full border rounded p-2"></div>
                                    <div><label>Victim current location</label><input id="reportCurrentLocation" placeholder="Where is victim now?" class="w-full border rounded p-2"></div>
                                    <div><label>Victim Full Name</label><input id="reportVictimName" placeholder="Full name" class="w-full border rounded p-2"></div>
                                    <div><label>Victim Contact</label><input id="reportVictimContact" placeholder="Phone/Email" class="w-full border rounded p-2"></div>
                                    <div><label>Next of Kin</label><input id="reportNextKin" placeholder="Name & Contact" class="w-full border rounded p-2"></div>
                                    <div><label>Police Station</label><input id="reportPoliceStation" placeholder="Police station" class="w-full border rounded p-2"></div>
                                </div>
                                <div><label>Description *</label><textarea id="reportDesc" rows="3" placeholder="Describe the incident..." required class="w-full border rounded p-2"></textarea></div>
                                <div><label><input type="checkbox" id="anonymousCheck"> Submit anonymously</label></div>
                                <button type="submit" class="bg-red-600 text-white w-full py-2 rounded font-bold">Submit Report</button>
                            </form>
                        </div>
                        <div id="victimLoginPanel" class="bg-white rounded-xl shadow-lg p-6 max-w-md mx-auto hidden">
                            <h2 class="text-xl font-bold">Victim Login</h2>
                            <input type="text" id="victimCaseId" placeholder="Case ID" class="w-full border rounded p-2 my-2">
                            <input type="text" id="victimAccessCode" placeholder="Access Code" class="w-full border rounded p-2 my-2">
                            <button id="doVictimLogin" class="bg-green-600 text-white w-full py-2 rounded">Access My Case</button>
                            <button id="forgotDetailsBtn" class="text-blue-600 text-sm mt-2 w-full">Forgot ID/Code?</button>
                            <div id="victimLoginError" class="text-red-600 text-sm mt-2"></div>
                        </div>
                        <div id="staffLoginPanel" class="bg-white rounded-xl shadow-lg p-6 max-w-md mx-auto hidden">
                            <h2 class="text-xl font-bold">Staff Login</h2>
                            <div class="bg-blue-50 p-2 text-sm my-2"><p>SCOEN Admin: scoen_admin / admin123</p><p>Police Admin: police_admin / police123</p></div>
                            <input type="text" id="staffUsername" placeholder="Username" class="w-full border rounded p-2 my-2">
                            <input type="password" id="staffPassword" placeholder="Password" class="w-full border rounded p-2 my-2">
                            <select id="staffRole" class="w-full border rounded p-2 my-2">
                                <option value="admin">SCOEN Admin</option>
                                <option value="policeAdmin">Police Admin</option>
                                <option value="policeOfficer">Police Officer</option>
                                <option value="volunteer">CPV Volunteer</option>
                            </select>
                            <button id="doStaffLogin" class="bg-blue-600 text-white w-full py-2 rounded">Login</button>
                            <div id="staffLoginError" class="text-red-600 text-sm"></div>
                        </div>
                    </div>
                    <div class="contact-bar">
                        <div><i class="fas fa-phone-alt"></i> <strong>SCOEN:</strong> +256772519920</div>
                        <div><i class="fas fa-phone-alt"></i> <strong>Police:</strong> 999 / 0800199185</div>
                        <div><i class="fas fa-robot"></i> <button id="aiHelpBtn" class="bg-yellow-500 text-black px-3 py-1 rounded-full text-sm">AI Assistant</button></div>
                    </div>
                    <div class="bg-white rounded-xl shadow-lg p-4">
                        <details><summary><i class="fas fa-question-circle text-blue-600"></i> FAQs & Support</summary>
                        <div class="p-3"><p><strong>How to report?</strong> Use "Submit Report". You'll get Case ID & Access Code.</p><p><strong>Track case?</strong> Use Victim Login.</p><p><strong>Mismanagement?</strong> Click "Report Mismanagement" in victim dashboard.</p></div></details>
                    </div>
                    <footer class="text-center text-sm py-4">&copy; 2025 Uganda SafeVoice | www.safevoice-uganda.org | Fedmart Solutions</footer>
                </div>
            `;

            // Attach event listeners
            document.getElementById('showReportBtn').onclick = () => {
                document.getElementById('reportFormContainer').classList.remove('hidden');
                document.getElementById('victimLoginPanel').classList.add('hidden');
                document.getElementById('staffLoginPanel').classList.add('hidden');
            };
            document.getElementById('showVictimLoginBtn').onclick = () => {
                document.getElementById('victimLoginPanel').classList.remove('hidden');
                document.getElementById('reportFormContainer').classList.add('hidden');
                document.getElementById('staffLoginPanel').classList.add('hidden');
            };
            document.getElementById('showStaffLoginBtn').onclick = () => {
                document.getElementById('staffLoginPanel').classList.remove('hidden');
                document.getElementById('reportFormContainer').classList.add('hidden');
                document.getElementById('victimLoginPanel').classList.add('hidden');
            };
            document.getElementById('doStaffLogin').onclick = async () => {
                const username = document.getElementById('staffUsername').value.trim();
                const password = document.getElementById('staffPassword').value.trim();
                const role = document.getElementById('staffRole').value;
                const res = await apiFetch('/auth/login', { method: 'POST', body: JSON.stringify({ username, password, role }) });
                if (res && res.ok) {
                    const data = await res.json();
                    token = data.token;
                    currentUser = data.user;
                    localStorage.setItem('token', token);
                    localStorage.setItem('user', JSON.stringify(currentUser));
                    renderDashboard();
                } else {
                    document.getElementById('staffLoginError').innerText = 'Invalid credentials';
                }
            };
            document.getElementById('doVictimLogin').onclick = async () => {
                const caseId = document.getElementById('victimCaseId').value.trim();
                const accessCode = document.getElementById('victimAccessCode').value.trim();
                const res = await fetch(`${API_BASE}/cases/victim-login`, { method: 'POST', body: JSON.stringify({ caseId, accessCode }), headers: { 'Content-Type': 'application/json' } });
                if (res.ok) {
                    const report = await res.json();
                    renderVictimDashboard(report);
                } else {
                    document.getElementById('victimLoginError').innerText = 'Invalid Case ID or Access Code';
                }
            };
            document.getElementById('forgotDetailsBtn').onclick = () => alert('Contact support: +256772519920 to recover your Case ID and Access Code.');
            document.getElementById('aiHelpBtn').onclick = () => {
                const loc = prompt('Enter your district or village:');
                if (loc) alert(`AI Assistant: Nearest police station for ${loc} is your local police post. Call 999 for emergency.`);
            };
            document.getElementById('reportForm').onsubmit = async (e) => {
                e.preventDefault();
                let type = document.getElementById('reportType').value;
                let display = type === 'other' ? document.getElementById('otherTypeText').value : type;
                if (type === 'other' && !display) return alert('Please specify type');
                const anon = document.getElementById('anonymousCheck').checked;
                const newId = 'C' + Date.now().toString().slice(-6);
                const newReport = {
                    id: newId, accessCode: Math.floor(100000 + Math.random()*900000).toString(),
                    displayType: display, description: document.getElementById('reportDesc').value,
                    district: document.getElementById('reportDistrict').value,
                    subcounty: document.getElementById('reportSubcounty').value,
                    parish: document.getElementById('reportParish').value,
                    village: document.getElementById('reportVillage').value,
                    currentLocation: document.getElementById('reportCurrentLocation').value,
                    victimName: anon ? 'Anonymous' : document.getElementById('reportVictimName').value,
                    victimContact: anon ? '' : document.getElementById('reportVictimContact').value,
                    nextKin: anon ? '' : document.getElementById('reportNextKin').value,
                    policeStation: document.getElementById('reportPoliceStation').value
                };
                const res = await apiFetch('/cases', { method: 'POST', body: JSON.stringify(newReport) });
                if (res && res.ok) {
                    alert(`Case ID: ${newId}\nAccess Code: ${newReport.accessCode}`);
                    showNotification('Report submitted successfully', 'success');
                    document.getElementById('reportForm').reset();
                } else {
                    alert('Submission failed. Please try again.');
                }
            };
            document.getElementById('reportType').addEventListener('change', e => {
                document.getElementById('otherTypeText').classList.toggle('hidden', e.target.value !== 'other');
            });
        }

        // ======================== VICTIM DASHBOARD ========================
        async function renderVictimDashboard(report) {
            document.getElementById('app').innerHTML = `
                <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6 my-6">
                    <div class="flex justify-between"><h2 class="text-xl font-bold">Case ${report.id}</h2><button id="backHome" class="bg-gray-500 text-white px-3 py-1 rounded">Exit</button></div>
                    <div class="grid grid-cols-2 gap-2 mt-3 text-sm"><p><strong>Status:</strong> ${getStatusBadge(report.status)}</p><p><strong>Type:</strong> ${report.display_type}</p><p><strong>Location:</strong> ${report.village}, ${report.district}</p><p><strong>Police Station:</strong> ${report.police_station || 'Not assigned'}</p></div>
                    <div class="mt-4"><p class="font-bold">Messages</p><div id="msgArea" class="bg-gray-50 p-3 rounded h-40 overflow-auto">${(report.messages || []).map(m => `<div><strong>${m.from}:</strong> ${m.text}</div>`).join('')}</div>
                    <textarea id="victimReply" placeholder="Reply to authorities..." class="w-full border rounded p-2 mt-2"></textarea>
                    <button id="sendReply" class="bg-blue-600 text-white px-3 py-1 rounded mt-1">Send Reply</button>
                    <button id="whistleBtn" class="bg-red-600 text-white px-3 py-1 rounded ml-2">⚠️ Report Mismanagement</button></div>
                </div>
            `;
            document.getElementById('backHome').onclick = () => renderPublicView();
            document.getElementById('sendReply').onclick = async () => {
                const msg = document.getElementById('victimReply').value.trim();
                if (!msg) return;
                const messages = report.messages || [];
                messages.push({ from: `Victim (${report.id})`, text: msg, readBy: [] });
                await apiFetch(`/cases/${report.id}`, { method: 'PUT', body: JSON.stringify({ messages }) });
                showNotification('Reply sent', 'success');
                renderVictimDashboard(report);
            };
            document.getElementById('whistleBtn').onclick = async () => {
                await apiFetch(`/cases/${report.id}`, { method: 'PUT', body: JSON.stringify({ status: 'case_mismanaged' }) });
                showNotification('Admin notified of mismanagement', 'warning');
                renderVictimDashboard(report);
            };
        }

        // ======================== DASHBOARD RENDERERS (simplified but functional) ========================
        async function renderAdminDashboard() {
            const casesRes = await apiFetch('/cases');
            const usersRes = await apiFetch('/users');
            const auditRes = await apiFetch('/audit');
            const cases = casesRes ? await casesRes.json() : [];
            const usersList = usersRes ? await usersRes.json() : [];
            const auditLogs = auditRes ? await auditRes.json() : [];

            const stats = { pending:0, dispatched:0, investigating:0, resolved:0, victim_arrested:0, victim_in_court:0, victim_convicted:0, case_mismanaged:0 };
            cases.forEach(c => { if (stats[c.status] !== undefined) stats[c.status]++; });

            const html = `
                <div class="max-w-7xl mx-auto px-4 py-6">
                    <div class="bg-white shadow-md p-2 flex justify-between items-center rounded-lg">
                        <div><i class="fas fa-shield-alt text-red-600"></i> SafeVoice <span class="bg-gray-200 px-2 rounded">${currentUser.role}</span></div>
                        <div><img src="${currentUser.profilePhoto || 'https://via.placeholder.com/40'}" class="profile-img inline"> <span>${currentUser.fullName}</span> <button id="logoutBtn" class="bg-gray-500 text-white text-xs px-2 py-1 rounded ml-2">Logout</button></div>
                    </div>
                    <div class="grid grid-cols-4 sm:grid-cols-8 gap-2 my-4">${Object.entries(stats).map(([k,v]) => `<div class="stat-card bg-white p-2 text-center rounded shadow cursor-pointer" data-status="${k}"><div class="font-bold">${v}</div><div class="text-xs">${statusLabels[k]}</div></div>`).join('')}</div>
                    <details open><summary>Active Cases</summary><div class="details-content"><div class="flex gap-2 mb-2"><button id="pdfReportBtn" class="bg-red-600 text-white px-2 py-1 rounded text-sm">PDF Report</button><button id="regCpvBtn" class="bg-green-600 text-white px-2 py-1 rounded">+ CPV</button><button id="regOfficerBtn" class="bg-pink-600 text-white px-2 py-1 rounded">+ Officer</button></div><div class="table-responsive"><table class="min-w-full text-sm border"><thead><tr><th>ID</th><th>Type</th><th>Location</th><th>Victim</th><th>Next of Kin</th><th>Status</th><th>Assign CPV</th><th>Actions</th></tr></thead><tbody>${cases.filter(c => !c.archive).map(c => `<tr><td class="font-mono">${c.id}</td><td>${c.display_type}</td><td>${c.village}, ${c.district}</td><td>${c.victim_name || 'anon'}</td><td>${c.next_kin || '-'}</td><td>${getStatusBadge(c.status)}</td><td><select class="assignSelect" data-id="${c.id}"><option value="">--CPV--</option>${usersList.filter(u=>u.role==='volunteer').map(v=>`<option value="${v.id}" ${c.assigned_volunteer===v.id?'selected':''}>${v.full_name}</option>`)}</select><button class="assignCpvBtn bg-teal-600 text-white text-xs px-1 rounded" data-id="${c.id}">Assign</button></td><td><button class="viewCaseBtn text-blue-600" data-id="${c.id}">View</button> ${c.status!=='dispatched' ? `<button class="dispatchBtn bg-purple-600 text-white text-xs px-2 rounded ml-1" data-id="${c.id}">→Police</button>` : ''} ${!c.archive ? `<button class="resolveBtn bg-green-600 text-white text-xs px-2 rounded ml-1" data-id="${c.id}">Resolve</button>` : ''}</td></tr>`).join('')}</tbody>}table</div></div></details>
                    <details><summary>Resolved Cases</summary><div class="details-content"><table class="min-w-full text-sm border"><thead><tr><th>ID</th><th>Type</th><th>Location</th><th>Resolved Date</th><th>Actions</th></tr></thead><tbody>${cases.filter(c => c.archive).map(c => `<tr><td class="font-mono">${c.id}</td><td>${c.display_type}</td><td>${c.district}, ${c.village}</td><td>${c.resolved_date || 'N/A'}</td><td><button class="reopenBtn bg-gray-600 text-white text-xs px-2 rounded" data-id="${c.id}">Reopen</button></td></tr>`).join('')}</tbody>}table</div></details>
                    <details><summary>User Management</summary><div class="details-content"><table class="min-w-full text-sm border"><thead><tr><th>Username</th><th>Full Name</th><th>Role</th><th>Contact</th><th>District/Station</th><th>Reg. Date</th><th>Actions</th></tr></thead><tbody>${usersList.map(u => `<tr><td>${u.username}</td><td>${u.full_name}</td><td>${u.role}</td><td>${u.contact || '-'}</td><td>${u.district || u.station || '-'}</td><td>${u.registration_date || '-'}</td><td><button class="editUserBtn text-blue-600 text-xs" data-id="${u.id}">Edit</button> <button class="deleteUserBtn text-red-600 text-xs" data-id="${u.id}">Del</button></td></tr>`).join('')}</tbody>}table</div></details>
                    <details><summary>Audit Trail</summary><div class="details-content h-48 overflow-auto text-xs">${auditLogs.map(a => `<div>${a.timestamp} - ${a.action} (${a.username})</div>`).join('')}</div></details>
                </div>
            `;
            document.getElementById('app').innerHTML = html;
            document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); token = null; currentUser = null; renderPublicView(); };
            // Additional event handlers (simplified for brevity – you can expand)
            document.getElementById('regCpvBtn').onclick = () => alert('CPV registration form would open here');
            document.getElementById('regOfficerBtn').onclick = () => alert('Officer registration form would open here');
            document.getElementById('pdfReportBtn').onclick = () => alert('PDF report generation');
            document.querySelectorAll('.viewCaseBtn').forEach(btn => btn.onclick = () => alert('View case details (implement modal)'));
        }

        async function renderDashboard() {
            if (!currentUser) return renderPublicView();
            if (currentUser.role === 'admin') await renderAdminDashboard();
            else if (currentUser.role === 'policeAdmin') alert('Police Admin dashboard (to be implemented)');
            else if (currentUser.role === 'policeOfficer') alert('Officer dashboard');
            else if (currentUser.role === 'volunteer') alert('CPV dashboard');
        }

        // ======================== BOOTSTRAP ========================
        if (token) {
            fetch(`${API_BASE}/cases`, { headers: { 'Authorization': `Bearer ${token}` } })
                .then(res => res.ok ? res.json() : Promise.reject())
                .then(() => { currentUser = JSON.parse(localStorage.getItem('user') || '{}'); renderDashboard(); })
                .catch(() => { localStorage.clear(); renderPublicView(); });
        } else {
            renderPublicView();
        }
    </script>
</body>
</html>
